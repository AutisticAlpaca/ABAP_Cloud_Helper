<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABAP Cloud Helper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
      <!-- APP -->
  <div class="app">
    <!-- TOPBAR -->
    <header class="topbar">
      <div class="logo-area">
        <div class="logo-circle">☁</div>
        <div>
          <h1>ABAP Cloud Helper</h1>
          <p>Migration Assistant</p>
        </div>
      </div>
    </header>

    <!-- NAVIGATION -->
    <nav class="tabs">
      <button class="tab active" data-view="tables">
        Tables
      </button>

      <button class="tab" data-view="fm">
        Function Modules
      </button>

      <button class="tab" data-view="snippets">
        Snippets
      </button>

      <button class="tab" data-view="rap">
        RAP
      </button>
    </nav>

    <!-- MAIN -->
    <main class="content">

      <!-- SEARCH -->
      <section class="search-section">
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Search SAP object..."
        />
      </section>

      <!-- RESULT COUNT -->
      <div id="resultCount" class="result-count"></div>
      
      <!-- RESULT AREA -->
      <section id="results" class="results-grid">
      </section>
    </main>

  </div>

  <script src="script.js"></script>
</body>
</html>
